name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run Tests
        run: go test ./...

      - name: Build and Generate Checksums
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=${GITHUB_SHA::7}
          BUILD_DATE=$(date -u +%Y-%m-%d)
          
          LDFLAGS="-X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.BuildDate=${BUILD_DATE}"
          
          echo "Building darwin/arm64..."
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o devdock-darwin-arm64 ./cmd/devdock
          
          echo "Building darwin/amd64..."
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o devdock-darwin-amd64 ./cmd/devdock
          
          echo "Generating checksums..."
          shasum -a 256 devdock-darwin-arm64 devdock-darwin-amd64 > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            devdock-darwin-arm64
            devdock-darwin-amd64
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
